<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="MeinWetter">
<meta name="theme-color" content="#b8d4e8">
<title>MeinWetter</title>
<link rel="manifest" href="manifest.json">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<style>
/* ═══════════════════════════════════════════════
   RESET & BASE
   ═══════════════════════════════════════════════ */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{-webkit-text-size-adjust:100%;touch-action:pan-x pan-y;overscroll-behavior:none}
body{
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,sans-serif;
  background:#b8d4e8;
  color:#e8f0f8;
  min-height:100vh;
  min-height:100dvh;
  padding:0 0 env(safe-area-inset-bottom,20px) 0;
  -webkit-overflow-scrolling:touch;
  overflow-x:hidden;
}
/* ═══════════════════════════════════════════════
   HEADER
   ═══════════════════════════════════════════════ */
.header{
  display:flex;align-items:center;gap:8px;
  padding:12px 16px;
  padding-top:max(12px,env(safe-area-inset-top,12px));
  background:linear-gradient(135deg,#1a2a4a,#223355);
  position:sticky;top:0;z-index:1000;
  box-shadow:0 2px 12px rgba(0,0,0,.3);
}
.logo{
  font-size:18px;font-weight:700;white-space:nowrap;
  background:linear-gradient(135deg,#64b5f6,#42a5f5);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  letter-spacing:-.5px;
}
.logo span{font-size:14px;opacity:.7}
.search-wrap{
  flex:1;position:relative;
  display:flex;align-items:center;
  background:rgba(255,255,255,.1);
  border-radius:12px;height:40px;
  border:1px solid rgba(255,255,255,.08);
}
.fav-btn{
  background:none;border:none;color:#ffd54f;font-size:18px;
  padding:0 10px;cursor:pointer;height:100%;
  display:flex;align-items:center;
}
.fav-btn.inactive{color:rgba(255,255,255,.3)}
.search-input{
  flex:1;background:none;border:none;outline:none;
  color:#e8f0f8;font-size:15px;height:100%;
  padding:0;
}
.search-input::placeholder{color:rgba(255,255,255,.4)}
.search-icon{
  background:none;border:none;color:rgba(255,255,255,.5);
  font-size:16px;padding:0 12px;cursor:pointer;height:100%;
  display:flex;align-items:center;
}
.refresh-btn{
  background:none;border:none;color:#64b5f6;font-size:22px;
  cursor:pointer;padding:4px 4px 4px 8px;
  transition:transform .3s;
}
.refresh-btn.spinning{animation:spin .8s ease}
@keyframes spin{to{transform:rotate(360deg)}}

/* Search Dropdown */
.search-dropdown{
  position:absolute;top:calc(100% + 4px);left:0;right:0;
  background:#1a2a4a;border-radius:12px;
  box-shadow:0 8px 32px rgba(0,0,0,.5);
  max-height:280px;overflow-y:auto;
  z-index:999;display:none;
  border:1px solid rgba(255,255,255,.08);
}
.search-dropdown.show{display:block}
.search-item{
  padding:12px 16px;cursor:pointer;
  display:flex;align-items:center;gap:10px;
  border-bottom:1px solid rgba(255,255,255,.05);
  transition:background .15s;
}
.search-item:last-child{border-bottom:none}
.search-item:hover,.search-item:active{background:rgba(255,255,255,.08)}
.search-item .si-icon{font-size:16px;opacity:.6}
.search-item .si-name{font-size:14px;flex:1}
.search-item .si-region{font-size:12px;opacity:.5}
.search-item .si-fav{font-size:14px;color:#ffd54f;cursor:pointer;padding:4px}

/* ═══════════════════════════════════════════════
   CARDS
   ═══════════════════════════════════════════════ */
.cards{padding:12px 12px 20px}
.card{
  background:linear-gradient(145deg,#1a2a4a 0%,#1e3050 100%);
  border-radius:20px;
  padding:20px;
  margin-bottom:12px;
  box-shadow:0 4px 20px rgba(0,0,0,.2);
  border:1px solid rgba(255,255,255,.05);
  overflow:hidden;
}
.card-title{
  font-size:13px;font-weight:600;text-transform:uppercase;
  letter-spacing:1.5px;opacity:.5;margin-bottom:14px;
}

/* ═══════════════════════════════════════════════
   CARD 1: Current Weather
   ═══════════════════════════════════════════════ */
.current-top{display:flex;align-items:flex-start;justify-content:space-between}
.current-left{}
.city-name{font-size:22px;font-weight:700;margin-bottom:2px}
.current-temp{font-size:72px;font-weight:200;line-height:1;letter-spacing:-4px}
.current-temp .unit{font-size:32px;font-weight:300;letter-spacing:0}
.feels-like{font-size:15px;opacity:.6;margin-top:4px}
.current-right{text-align:center;padding-top:8px}
.weather-icon-big{font-size:64px;line-height:1}
.sun-times{
  display:flex;align-items:center;gap:6px;
  font-size:12px;opacity:.6;margin-top:8px;
  white-space:nowrap;
}
.sun-times .sun-icon{font-size:14px}

/* ═══════════════════════════════════════════════
   CARD 2: Hourly Forecast
   ═══════════════════════════════════════════════ */
.hourly-scroll{
  display:flex;gap:2px;
  overflow-x:auto;
  -webkit-overflow-scrolling:touch;
  scrollbar-width:none;
  padding-bottom:4px;
  margin:0 -20px;padding-left:20px;padding-right:20px;
}
.hourly-scroll::-webkit-scrollbar{display:none}
.hour-item{
  flex:0 0 62px;
  text-align:center;
  padding:10px 4px;
  border-radius:14px;
  transition:background .2s;
}
.hour-item.now{background:rgba(100,181,246,.2);border:1px solid rgba(100,181,246,.3)}
.hour-time{font-size:12px;opacity:.6;margin-bottom:6px}
.hour-temp{font-size:16px;font-weight:600;margin-bottom:4px}
.hour-icon{font-size:24px;margin-bottom:4px}
.hour-rain{font-size:11px;opacity:.5;display:flex;align-items:center;justify-content:center;gap:2px}
.hour-rain-mm{font-size:10px;color:#64b5f6;margin-top:2px}

/* ═══════════════════════════════════════════════
   CARD 3: 10-Day Forecast
   ═══════════════════════════════════════════════ */
.forecast-day{
  display:grid;
  grid-template-columns:60px 1fr 42px 42px 28px 44px 50px;
  align-items:center;gap:4px;
  padding:10px 0;
  border-bottom:1px solid rgba(255,255,255,.06);
  cursor:pointer;
  transition:background .15s;
}
.forecast-day:active{background:rgba(255,255,255,.04)}
.forecast-day:last-child{border-bottom:none}
.fd-day{font-size:13px;font-weight:600}
.fd-date{font-size:11px;opacity:.4}
.fd-icon{font-size:24px;text-align:center}
.fd-max{font-size:16px;font-weight:700;text-align:right}
.fd-min{font-size:14px;opacity:.5;text-align:right}
.fd-sun{font-size:11px;opacity:.5;text-align:center;display:flex;align-items:center;gap:2px;justify-content:center}
.fd-rain{font-size:11px;opacity:.5;text-align:right;display:flex;align-items:center;gap:2px;justify-content:flex-end}

/* Day Detail Expansion */
.day-detail{
  display:none;
  padding:12px 0 8px;
  border-bottom:1px solid rgba(255,255,255,.06);
}
.day-detail.open{display:block}
.day-parts{
  display:grid;grid-template-columns:repeat(4,1fr);gap:8px;
  margin-bottom:14px;
}
.day-part{
  text-align:center;
  background:rgba(255,255,255,.04);
  border-radius:12px;padding:10px 4px;
}
.dp-label{font-size:10px;text-transform:uppercase;opacity:.4;margin-bottom:6px;letter-spacing:.5px}
.dp-icon{font-size:22px;margin-bottom:4px}
.dp-temp{font-size:14px;font-weight:600}
.day-info-grid{
  display:grid;grid-template-columns:1fr 1fr;gap:8px 16px;
  font-size:13px;
}
.di-item{display:flex;align-items:center;gap:6px;opacity:.7}
.di-icon{font-size:14px;width:20px;text-align:center}

/* ═══════════════════════════════════════════════
   CARD 4: Temperature Chart
   ═══════════════════════════════════════════════ */
.temp-chart-wrap{
  position:relative;
  height:180px;
  margin:0 -8px;
}
.temp-chart-wrap canvas{width:100%!important;height:100%!important}

/* ═══════════════════════════════════════════════
   CARD 5: Rain Radar
   ═══════════════════════════════════════════════ */
.radar-wrap{
  position:relative;
  height:300px;
  border-radius:12px;
  overflow:hidden;
  margin:0 -8px;
}
.radar-wrap.fullscreen{
  position:fixed;top:0;left:0;right:0;bottom:0;
  z-index:2000;height:100vh;height:100dvh;
  margin:0;border-radius:0;
}
#radar-map{height:100%;width:100%;background:#0a1628}
.radar-controls{
  position:absolute;bottom:12px;left:12px;right:12px;
  display:flex;align-items:center;gap:8px;
  z-index:1001;
  background:rgba(26,42,74,.9);
  padding:8px 12px;border-radius:10px;
  backdrop-filter:blur(8px);
}
.radar-btn{
  background:none;border:none;color:#e8f0f8;
  font-size:18px;cursor:pointer;padding:4px;
}
.radar-time{font-size:12px;flex:1;text-align:center;opacity:.7}
.radar-fs-btn{
  position:absolute;top:12px;right:12px;z-index:1001;
  background:rgba(26,42,74,.85);border:none;color:#e8f0f8;
  font-size:16px;padding:8px;border-radius:8px;cursor:pointer;
  backdrop-filter:blur(8px);
}
.radar-slider{
  flex:1;-webkit-appearance:none;appearance:none;
  height:3px;background:rgba(255,255,255,.2);
  border-radius:2px;outline:none;
}
.radar-slider::-webkit-slider-thumb{
  -webkit-appearance:none;width:14px;height:14px;
  border-radius:50%;background:#64b5f6;cursor:pointer;
}

/* ═══════════════════════════════════════════════
   CARD 6: UV Index
   ═══════════════════════════════════════════════ */
.uv-chart{
  display:flex;align-items:flex-end;gap:6px;
  height:120px;padding-top:20px;
}
.uv-bar-wrap{
  flex:1;display:flex;flex-direction:column;
  align-items:center;gap:4px;height:100%;
  justify-content:flex-end;
}
.uv-val{font-size:11px;font-weight:600}
.uv-bar{
  width:100%;border-radius:6px 6px 4px 4px;
  min-height:4px;transition:height .5s ease;
}
.uv-day{font-size:10px;opacity:.4;margin-top:2px}

/* UV Colors */
.uv-low{background:linear-gradient(to top,#4caf50,#66bb6a)}
.uv-mod{background:linear-gradient(to top,#ffc107,#ffca28)}
.uv-high{background:linear-gradient(to top,#ff9800,#ffb74d)}
.uv-vhigh{background:linear-gradient(to top,#f44336,#e57373)}
.uv-extreme{background:linear-gradient(to top,#9c27b0,#ba68c8)}

/* ═══════════════════════════════════════════════
   LOADING / ERROR
   ═══════════════════════════════════════════════ */
.loading-overlay{
  position:fixed;top:0;left:0;right:0;bottom:0;
  background:rgba(26,42,74,.95);
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  z-index:3000;transition:opacity .3s;
}
.loading-overlay.hide{opacity:0;pointer-events:none}
.loader{
  width:40px;height:40px;
  border:3px solid rgba(255,255,255,.1);
  border-top-color:#64b5f6;
  border-radius:50%;
  animation:spin .8s linear infinite;
}
.loading-text{margin-top:16px;font-size:14px;opacity:.5}
.error-toast{
  position:fixed;bottom:80px;left:16px;right:16px;
  background:#c62828;color:#fff;
  padding:12px 16px;border-radius:12px;
  font-size:13px;z-index:3001;
  transform:translateY(100px);opacity:0;
  transition:all .3s ease;
  text-align:center;
}
.error-toast.show{transform:translateY(0);opacity:1}

/* Wind direction arrow */
.wind-arrow{display:inline-block;transition:transform .3s}

/* Attribution */
.attribution{
  text-align:center;font-size:10px;opacity:.3;
  padding:8px 16px 20px;
}
.attribution a{color:inherit}
</style>
</head>
<body>

<!-- Loading Overlay -->
<div class="loading-overlay" id="loadingOverlay">
  <div class="loader"></div>
  <div class="loading-text">Wetterdaten laden…</div>
</div>

<!-- Error Toast -->
<div class="error-toast" id="errorToast"></div>

<!-- Header -->
<header class="header">
  <div class="logo">☁️ MeinWetter</div>
  <div class="search-wrap" id="searchWrap">
    <button class="fav-btn inactive" id="favToggle" aria-label="Favorit">★</button>
    <input class="search-input" id="searchInput" type="text" placeholder="Stadt suchen" autocomplete="off" enterkeyhint="search">
    <button class="search-icon" id="searchBtn" aria-label="Suchen">🔍</button>
    <div class="search-dropdown" id="searchDropdown"></div>
  </div>
  <button class="refresh-btn" id="refreshBtn" aria-label="Aktualisieren">⟳</button>
</header>

<!-- Cards Container -->
<main class="cards" id="cardsContainer">

  <!-- Card 1: Current Weather -->
  <div class="card" id="cardCurrent">
    <div class="current-top">
      <div class="current-left">
        <div class="city-name" id="cityName">—</div>
        <div class="current-temp" id="currentTemp">--<span class="unit">°</span></div>
        <div class="feels-like" id="feelsLike">gefühlt --°</div>
      </div>
      <div class="current-right">
        <div class="weather-icon-big" id="currentIcon">⛅</div>
        <div class="sun-times" id="sunTimes">
          <span class="sun-icon">☀️</span>
          <span>↑ --:--</span>
          <span>↓ --:--</span>
        </div>
      </div>
    </div>
  </div>

  <!-- Card 2: Hourly Forecast -->
  <div class="card" id="cardHourly">
    <div class="card-title">Stündlich</div>
    <div class="hourly-scroll" id="hourlyScroll"></div>
  </div>

  <!-- Card 3: 10-Day Forecast -->
  <div class="card" id="cardForecast">
    <div class="card-title">Vorhersage</div>
    <div id="forecastList"></div>
  </div>

  <!-- Card 4: Temperature Chart -->
  <div class="card" id="cardChart">
    <div class="card-title">Temperaturverlauf</div>
    <div class="temp-chart-wrap">
      <canvas id="tempChart"></canvas>
    </div>
  </div>

  <!-- Card 5: Rain Radar -->
  <div class="card" id="cardRadar">
    <div class="card-title">Regenradar</div>
    <div class="radar-wrap" id="radarWrap">
      <div id="radar-map"></div>
      <button class="radar-fs-btn" id="radarFsBtn">⛶</button>
      <div class="radar-controls">
        <button class="radar-btn" id="radarPlayBtn">▶</button>
        <input type="range" class="radar-slider" id="radarSlider" min="0" max="0" value="0">
        <span class="radar-time" id="radarTime">--:--</span>
      </div>
    </div>
  </div>

  <!-- Card 6: UV Index -->
  <div class="card" id="cardUV">
    <div class="card-title">UV-Index</div>
    <div class="uv-chart" id="uvChart"></div>
  </div>

</main>

<div class="attribution">
  Daten: DWD via Bright Sky · Radar: RainViewer · Karte: OpenStreetMap
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script>
/* ═══════════════════════════════════════════════════════════════
   MeinWetter PWA - Single File Weather App
   ═══════════════════════════════════════════════════════════════ */
(function(){
'use strict';

// ─── Storage Wrapper ───────────────────────────────────────
const Store = {
  _mem: {},
  get(k) {
    try { const v = localStorage.getItem(k); return v ? JSON.parse(v) : null; }
    catch(e) { return this._mem[k] || null; }
  },
  set(k, v) {
    try { localStorage.setItem(k, JSON.stringify(v)); }
    catch(e) { this._mem[k] = v; }
  }
};

// ─── State ─────────────────────────────────────────────────
let currentCity = Store.get('lastCity') || { name:'Berlin', lat:52.52, lon:13.405 };
let favorites = Store.get('favorites') || [];
let expandedDay = -1;
let radarMap = null;
let radarLayers = [];
let radarFrames = [];
let radarAnimPos = 0;
let radarPlaying = false;
let radarInterval = null;
let searchTimeout = null;

// ─── DOM Refs ──────────────────────────────────────────────
const $ = id => document.getElementById(id);
const loadingOverlay = $('loadingOverlay');
const errorToast = $('errorToast');
const searchInput = $('searchInput');
const searchDropdown = $('searchDropdown');
const favToggle = $('favToggle');
const refreshBtn = $('refreshBtn');

// ─── Weather Icons ─────────────────────────────────────────
const ICONS = {
  'clear-day': '☀️', 'clear-night': '🌙',
  'partly-cloudy-day': '⛅', 'partly-cloudy-night': '☁️',
  'cloudy': '☁️', 'fog': '🌫️',
  'wind': '💨', 'rain': '🌧️', 'sleet': '🌨️',
  'snow': '❄️', 'hail': '🌨️', 'thunderstorm': '⛈️',
  'dry': '☀️', null: '⛅', undefined: '⛅'
};
function weatherIcon(icon) { return ICONS[icon] || '⛅'; }
function conditionText(icon) {
  const map = {
    'clear-day':'Klar','clear-night':'Klar','partly-cloudy-day':'Teilw. bewölkt',
    'partly-cloudy-night':'Bewölkt','cloudy':'Bewölkt','fog':'Nebel','wind':'Windig',
    'rain':'Regen','sleet':'Schneeregen','snow':'Schnee','hail':'Hagel',
    'thunderstorm':'Gewitter','dry':'Trocken'
  };
  return map[icon] || 'Wechselhaft';
}

// ─── Helpers ───────────────────────────────────────────────
function pad(n){ return String(n).padStart(2,'0'); }
function fmt(d){ return pad(d.getDate())+'.'+pad(d.getMonth()+1); }
function fmtTime(d){ return pad(d.getHours())+':'+pad(d.getMinutes()); }
function dayName(d, short){
  const days = short
    ? ['So','Mo','Di','Mi','Do','Fr','Sa']
    : ['Sonntag','Montag','Dienstag','Mittwoch','Donnerstag','Freitag','Samstag'];
  return days[d.getDay()];
}
function relDay(d, i){
  if(i===0) return 'Heute';
  if(i===1) return 'Morgen';
  return dayName(d, false);
}
function round(v, decimals=0){
  if(v == null) return '--';
  return Number(v).toFixed(decimals);
}
function windDir(deg){
  if(deg == null) return '';
  const dirs = ['N','NNO','NO','ONO','O','OSO','SO','SSO','S','SSW','SW','WSW','W','WNW','NW','NNW'];
  return dirs[Math.round(deg/22.5)%16];
}

// ─── Show/Hide Loading ─────────────────────────────────────
function showLoading(){ loadingOverlay.classList.remove('hide'); }
function hideLoading(){ loadingOverlay.classList.add('hide'); }
function showError(msg){
  errorToast.textContent = msg;
  errorToast.classList.add('show');
  setTimeout(()=> errorToast.classList.remove('show'), 4000);
}

// ─── API Calls ─────────────────────────────────────────────
async function fetchJSON(url){
  const r = await fetch(url);
  if(!r.ok) throw new Error(`HTTP ${r.status}`);
  return r.json();
}

async function getCurrentWeather(lat, lon){
  const data = await fetchJSON(
    `https://api.brightsky.dev/current_weather?lat=${lat}&lon=${lon}`
  );
  // current_weather endpoint returns { weather: {...}, sources: [...] }
  return data.weather || {};
}

async function getHourlyForecast(lat, lon){
  const now = new Date();
  const from = now.toISOString();
  const to = new Date(now.getTime() + 48*3600*1000).toISOString();
  const data = await fetchJSON(
    `https://api.brightsky.dev/weather?lat=${lat}&lon=${lon}&date=${from}&last_date=${to}`
  );
  return data.weather || [];
}

async function get10DayForecast(lat, lon){
  const now = new Date();
  const from = new Date(now);
  from.setHours(0,0,0,0);
  const to = new Date(from.getTime() + 10*24*3600*1000);
  const data = await fetchJSON(
    `https://api.brightsky.dev/weather?lat=${lat}&lon=${lon}&date=${from.toISOString()}&last_date=${to.toISOString()}`
  );
  return data.weather || [];
}

async function searchCity(q){
  const data = await fetchJSON(
    `https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(q)}&format=json&limit=6&countrycodes=de,at,ch&accept-language=de`
  );
  return data.map(r => ({
    name: r.display_name.split(',')[0],
    region: r.display_name.split(',').slice(1,3).join(',').trim(),
    lat: parseFloat(r.lat),
    lon: parseFloat(r.lon)
  }));
}

// ─── Data Processing ───────────────────────────────────────
function groupByDay(hourly){
  const days = {};
  hourly.forEach(h => {
    const d = new Date(h.timestamp);
    const key = d.toISOString().slice(0,10);
    if(!days[key]) days[key] = { date:key, hours:[] };
    days[key].hours.push(h);
  });
  return Object.values(days).slice(0,10);
}

function dayAggregates(dayData){
  const temps = dayData.hours.map(h=>h.temperature).filter(t=>t!=null);
  const icons = dayData.hours.filter(h=>h.icon!=null).map(h=>h.icon);
  const precipProbs = dayData.hours.map(h=>h.precipitation_probability).filter(p=>p!=null);
  const precips = dayData.hours.map(h=>h.precipitation).filter(p=>p!=null);
  const sunshine = dayData.hours.map(h=>h.sunshine).filter(s=>s!=null);
  const winds = dayData.hours.map(h=>h.wind_speed).filter(w=>w!=null);
  const windDirs = dayData.hours.map(h=>h.wind_direction).filter(d=>d!=null);
  const windGusts = dayData.hours.map(h=>h.wind_gust_speed).filter(g=>g!=null);

  // Pick dominant icon from daytime hours (6-18)
  const dayIcons = dayData.hours.filter(h=>{
    const hr = new Date(h.timestamp).getHours();
    return hr >= 6 && hr <= 18 && h.icon != null;
  }).map(h=>h.icon);
  const iconCounts = {};
  (dayIcons.length ? dayIcons : icons).forEach(i=>{
    iconCounts[i] = (iconCounts[i]||0)+1;
  });
  const dominantIcon = Object.entries(iconCounts).sort((a,b)=>b[1]-a[1])[0]?.[0] || 'cloudy';

  // Day parts
  const parts = ['Vormittag','Nachmittag','Abend','Nacht'];
  const partRanges = [[6,12],[12,18],[18,22],[22,6]];
  const dayParts = parts.map((label,i)=>{
    const [start,end] = partRanges[i];
    const phours = dayData.hours.filter(h=>{
      const hr = new Date(h.timestamp).getHours();
      return i===3 ? (hr>=22||hr<6) : (hr>=start&&hr<end);
    });
    const pt = phours.map(h=>h.temperature).filter(t=>t!=null);
    const pi = phours.filter(h=>h.icon!=null).map(h=>h.icon);
    const pIcon = pi.length ? pi[Math.floor(pi.length/2)] : dominantIcon;
    return {
      label,
      icon: pIcon,
      temp: pt.length ? Math.round(pt.reduce((a,b)=>a+b,0)/pt.length) : null
    };
  });

  return {
    date: dayData.date,
    maxTemp: temps.length ? Math.round(Math.max(...temps)) : null,
    minTemp: temps.length ? Math.round(Math.min(...temps)) : null,
    icon: dominantIcon,
    sunshine: sunshine.length ? Math.round(sunshine.reduce((a,b)=>a+b,0)/60) : 0,
    rainProb: precipProbs.length ? Math.round(Math.max(...precipProbs)) : 0,
    rainMm: precips.length ? Math.round(precips.reduce((a,b)=>a+b,0)*10)/10 : 0,
    windSpeed: winds.length ? Math.round(winds.reduce((a,b)=>a+b,0)/winds.length) : null,
    windDir: windDirs.length ? Math.round(windDirs.reduce((a,b)=>a+b,0)/windDirs.length) : null,
    windGust: windGusts.length ? Math.round(Math.max(...windGusts)) : null,
    parts: dayParts,
    hours: dayData.hours
  };
}

// Compute apparent temperature (simplified heat index / wind chill)
// Bright Sky wind_speed is in km/h
function feelsLike(temp, windKmh, humidity){
  if(temp==null) return null;
  if(temp <= 10 && windKmh != null && windKmh > 4.8){
    // Wind chill (already in km/h)
    return Math.round(13.12 + 0.6215*temp - 11.37*Math.pow(windKmh,0.16) + 0.3965*temp*Math.pow(windKmh,0.16));
  }
  if(temp >= 27 && humidity != null){
    // Simplified heat index
    return Math.round(temp + 0.33 * (humidity/100 * 6.105 * Math.exp(17.27*temp/(237.7+temp))) - 4.0);
  }
  return Math.round(temp);
}

// Sunrise / Sunset calculation (simplified)
function sunCalc(lat, lon, date){
  const J = Math.floor((date.getTime()/86400000) + 2440587.5);
  const n = J - 2451545.0 + 0.0008;
  const Js = n - lon/360;
  const M = (357.5291 + 0.98560028 * Js) % 360;
  const Mrad = M * Math.PI/180;
  const C = 1.9148*Math.sin(Mrad) + 0.02*Math.sin(2*Mrad) + 0.0003*Math.sin(3*Mrad);
  const λ = (M + C + 180 + 102.9372) % 360;
  const λrad = λ * Math.PI/180;
  const Jt = 2451545 + Js + 0.0053*Math.sin(Mrad) - 0.0069*Math.sin(2*λrad);
  const sinδ = Math.sin(λrad) * Math.sin(23.4393 * Math.PI/180);
  const cosδ = Math.cos(Math.asin(sinδ));
  const latRad = lat * Math.PI/180;
  const cosω = (Math.sin(-0.833*Math.PI/180) - Math.sin(latRad)*sinδ) / (Math.cos(latRad)*cosδ);
  if(cosω > 1 || cosω < -1) return { sunrise:'--:--', sunset:'--:--' };
  const ω = Math.acos(cosω) * 180/Math.PI;
  const Jrise = Jt - ω/360;
  const Jset = Jt + ω/360;
  function jdToDate(jd){
    const ms = (jd - 2440587.5) * 86400000;
    return new Date(ms);
  }
  return {
    sunrise: fmtTime(jdToDate(Jrise)),
    sunset: fmtTime(jdToDate(Jset))
  };
}

// ─── Temperature Chart (Canvas) ────────────────────────────
function renderTempChart(days10){
  const grouped = groupByDay(days10);
  const aggregated = grouped.map(d => dayAggregates(d));

  const canvas = $('tempChart');
  const ctx = canvas.getContext('2d');
  const dpr = window.devicePixelRatio || 1;
  const rect = canvas.parentElement.getBoundingClientRect();
  canvas.width = rect.width * dpr;
  canvas.height = rect.height * dpr;
  ctx.scale(dpr, dpr);
  const W = rect.width;
  const H = rect.height;

  ctx.clearRect(0, 0, W, H);

  const maxTemps = aggregated.map(d => d.maxTemp).filter(t => t != null);
  const minTemps = aggregated.map(d => d.minTemp).filter(t => t != null);
  if(!maxTemps.length) return;

  const allTemps = [...maxTemps, ...minTemps];
  const tMin = Math.min(...allTemps) - 3;
  const tMax = Math.max(...allTemps) + 3;
  const padL = 10, padR = 10, padT = 30, padB = 30;
  const chartW = W - padL - padR;
  const chartH = H - padT - padB;
  const n = aggregated.length;

  function x(i){ return padL + (i/(n-1)) * chartW; }
  function y(t){ return padT + (1 - (t-tMin)/(tMax-tMin)) * chartH; }

  // Day labels
  ctx.font = '11px -apple-system, sans-serif';
  ctx.fillStyle = 'rgba(232,240,248,.4)';
  ctx.textAlign = 'center';
  aggregated.forEach((d, i) => {
    const date = new Date(d.date);
    ctx.fillText(dayName(date, true), x(i), H - 6);
  });

  // Max line
  ctx.beginPath();
  ctx.strokeStyle = '#ff7043';
  ctx.lineWidth = 2.5;
  ctx.lineJoin = 'round';
  aggregated.forEach((d, i) => {
    if(d.maxTemp == null) return;
    if(i===0) ctx.moveTo(x(i), y(d.maxTemp));
    else ctx.lineTo(x(i), y(d.maxTemp));
  });
  ctx.stroke();

  // Min line
  ctx.beginPath();
  ctx.strokeStyle = '#42a5f5';
  ctx.lineWidth = 2.5;
  aggregated.forEach((d, i) => {
    if(d.minTemp == null) return;
    if(i===0) ctx.moveTo(x(i), y(d.minTemp));
    else ctx.lineTo(x(i), y(d.minTemp));
  });
  ctx.stroke();

  // Fill between
  ctx.beginPath();
  aggregated.forEach((d, i) => {
    if(d.maxTemp == null) return;
    if(i===0) ctx.moveTo(x(i), y(d.maxTemp));
    else ctx.lineTo(x(i), y(d.maxTemp));
  });
  for(let i=aggregated.length-1; i>=0; i--){
    if(aggregated[i].minTemp == null) continue;
    ctx.lineTo(x(i), y(aggregated[i].minTemp));
  }
  ctx.closePath();
  const grad = ctx.createLinearGradient(0, padT, 0, padT+chartH);
  grad.addColorStop(0, 'rgba(255,112,67,.1)');
  grad.addColorStop(1, 'rgba(66,165,245,.1)');
  ctx.fillStyle = grad;
  ctx.fill();

  // Data points + labels
  aggregated.forEach((d, i) => {
    if(d.maxTemp != null){
      ctx.beginPath();
      ctx.arc(x(i), y(d.maxTemp), 4, 0, Math.PI*2);
      ctx.fillStyle = '#ff7043';
      ctx.fill();
      ctx.fillStyle = 'rgba(232,240,248,.9)';
      ctx.font = 'bold 11px -apple-system, sans-serif';
      ctx.fillText(d.maxTemp+'°', x(i), y(d.maxTemp)-10);
    }
    if(d.minTemp != null){
      ctx.beginPath();
      ctx.arc(x(i), y(d.minTemp), 4, 0, Math.PI*2);
      ctx.fillStyle = '#42a5f5';
      ctx.fill();
      ctx.fillStyle = 'rgba(232,240,248,.7)';
      ctx.font = '11px -apple-system, sans-serif';
      ctx.fillText(d.minTemp+'°', x(i), y(d.minTemp)+18);
    }
  });
}

function initRadar(){
  if(radarMap) return;
  radarMap = L.map('radar-map', {
    center: [currentCity.lat, currentCity.lon],
    zoom: 7,
    zoomControl: false,
    attributionControl: false
  });
  L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
    maxZoom: 12,
    subdomains: 'abcd'
  }).addTo(radarMap);

  // City marker
  L.circleMarker([currentCity.lat, currentCity.lon], {
    radius: 6, fillColor: '#64b5f6', fillOpacity: 0.8,
    color: '#fff', weight: 2
  }).addTo(radarMap);

  loadRadarFrames();

  // Controls
  $('radarPlayBtn').addEventListener('click', toggleRadarPlay);
  $('radarSlider').addEventListener('input', function(){
    radarAnimPos = parseInt(this.value);
    showRadarFrame(radarAnimPos);
  });
  $('radarFsBtn').addEventListener('click', toggleRadarFullscreen);
}

async function loadRadarFrames(){
  try {
    const data = await fetchJSON('https://api.rainviewer.com/public/weather-maps.json');
    radarFrames = [];
    if(data.radar && data.radar.past) radarFrames.push(...data.radar.past);
    if(data.radar && data.radar.nowcast) radarFrames.push(...data.radar.nowcast);

    const slider = $('radarSlider');
    slider.max = radarFrames.length - 1;
    slider.value = data.radar && data.radar.past ? data.radar.past.length - 1 : 0;
    radarAnimPos = parseInt(slider.value);

    // Preload layers
    radarLayers = radarFrames.map(frame => {
      return L.tileLayer(
        data.host + frame.path + '/256/{z}/{x}/{y}/2/1_0.png',
        { opacity: 0, zIndex: 300, maxZoom: 12 }
      );
    });
    radarLayers.forEach(l => l.addTo(radarMap));
    showRadarFrame(radarAnimPos);
  } catch(e) {
    console.error('Radar load error:', e);
  }
}

function showRadarFrame(pos){
  radarLayers.forEach((l, i) => {
    l.setOpacity(i === pos ? 0.6 : 0);
  });
  if(radarFrames[pos]){
    const d = new Date(radarFrames[pos].time * 1000);
    $('radarTime').textContent = fmtTime(d);
  }
  $('radarSlider').value = pos;
}

function toggleRadarPlay(){
  radarPlaying = !radarPlaying;
  $('radarPlayBtn').textContent = radarPlaying ? '⏸' : '▶';
  if(radarPlaying){
    radarInterval = setInterval(()=>{
      radarAnimPos = (radarAnimPos + 1) % radarFrames.length;
      showRadarFrame(radarAnimPos);
    }, 500);
  } else {
    clearInterval(radarInterval);
  }
}

function toggleRadarFullscreen(){
  const wrap = $('radarWrap');
  wrap.classList.toggle('fullscreen');
  $('radarFsBtn').textContent = wrap.classList.contains('fullscreen') ? '✕' : '⛶';
  setTimeout(() => radarMap.invalidateSize(), 300);
}

// ─── UV Index ──────────────────────────────────────────────
function renderUV(days10){
  const grouped = groupByDay(days10);
  const aggregated = grouped.map(d => dayAggregates(d));

  // Estimate UV from sunshine hours + latitude + time of year
  const container = $('uvChart');
  const maxPossibleUV = 11;

  // Simplified UV estimation based on sunshine and latitude
  const dayOfYear = Math.floor((new Date() - new Date(new Date().getFullYear(),0,0)) / 86400000);
  const latFactor = Math.cos((currentCity.lat - 23.5 * Math.cos(2*Math.PI*(dayOfYear-172)/365)) * Math.PI/180);
  const baseUV = Math.max(0, latFactor * 12);

  container.innerHTML = aggregated.slice(0,10).map((d, i) => {
    // UV estimation: base UV * cloud factor (sunshine hours / max sunshine hours)
    const maxSunH = 14; // rough max
    const cloudFactor = d.sunshine > 0 ? Math.min(1, d.sunshine / maxSunH) : 0.3;
    const uv = Math.round(Math.max(0, Math.min(maxPossibleUV, baseUV * cloudFactor)));

    const height = Math.max(8, (uv / maxPossibleUV) * 90);
    let colorClass = 'uv-low';
    if(uv >= 11) colorClass = 'uv-extreme';
    else if(uv >= 8) colorClass = 'uv-vhigh';
    else if(uv >= 6) colorClass = 'uv-high';
    else if(uv >= 3) colorClass = 'uv-mod';

    const date = new Date(d.date);
    const label = i === 0 ? 'Heu.' : i === 1 ? 'Mor.' : dayName(date, true);

    return `<div class="uv-bar-wrap">
      <div class="uv-val">${uv}</div>
      <div class="uv-bar ${colorClass}" style="height:${height}%"></div>
      <div class="uv-day">${label}</div>
    </div>`;
  }).join('');
}

async function doSearch(q){
  if(q.length < 2) { searchDropdown.classList.remove('show'); return; }
  searchDropdown.innerHTML = '<div class="search-item"><span class="si-icon">⏳</span><span class="si-name">Suche…</span></div>';
  searchDropdown.classList.add('show');

  try {
    const results = await searchCity(q);
    if(!results.length){
      searchDropdown.innerHTML = '<div class="search-item"><span class="si-icon">🔍</span><span class="si-name" style="opacity:.5">Keine Ergebnisse</span></div>';
      return;
    }
    searchDropdown.innerHTML = results.map(r => {
      const isFav = favorites.some(f => Math.abs(f.lat-r.lat)<0.01 && Math.abs(f.lon-r.lon)<0.01);
      return `<div class="search-item" data-lat="${r.lat}" data-lon="${r.lon}" data-name="${r.name}" data-region="${r.region}">
        <span class="si-icon">📍</span>
        <span class="si-name">${r.name}</span>
        <span class="si-region">${r.region}</span>
        <span class="si-fav" data-fav-lat="${r.lat}" data-fav-lon="${r.lon}" data-fav-name="${r.name}" data-fav-region="${r.region}">${isFav?'★':'☆'}</span>
      </div>`;
    }).join('');
    bindSearchItems();
  } catch(e) {
    searchDropdown.innerHTML = '<div class="search-item"><span class="si-icon">⚠️</span><span class="si-name">Fehler bei der Suche</span></div>';
  }
}

function bindSearchItems(){
  searchDropdown.querySelectorAll('.search-item').forEach(item => {
    item.addEventListener('click', function(e){
      // Check if clicking fav star
      if(e.target.classList.contains('si-fav')){
        e.stopPropagation();
        toggleFavorite({
          name: e.target.dataset.favName,
          lat: parseFloat(e.target.dataset.favLat),
          lon: parseFloat(e.target.dataset.favLon),
          region: e.target.dataset.favRegion
        });
        e.target.textContent = favorites.some(f => f.name === e.target.dataset.favName) ? '★' : '☆';
        return;
      }
      const lat = parseFloat(this.dataset.lat);
      const lon = parseFloat(this.dataset.lon);
      const name = this.dataset.name;
      if(!isNaN(lat) && !isNaN(lon) && name){
        selectCity({ name, lat, lon, region: this.dataset.region||'' });
      }
    });
  });
}

function selectCity(city){

  searchInput.value = '';

function toggleFavorite(city){

      getHourlyForecast(currentCity.lat, currentCity.lon),

    ]);

      let minDiff = Math.abs(new Date(hourly[0].timestamp).getTime() - now);
      hourly.forEach(h => {
        const diff = Math.abs(new Date(h.timestamp).getTime() - now);
        if(diff < minDiff){ minDiff = diff; nearest = h; }
      });
      ['precipitation','sunshine','wind_speed','wind_direction','wind_gust_speed',
       'cloud_cover','relative_humidity','icon','condition','temperature'].forEach(key => {
        if(current[key] == null && nearest[key] != null){
          current[key] = nearest[key];
        }
      });
    }

    renderCurrent(current);
    renderHourly(hourly);
    renderForecast(forecast10);
    renderTempChart(forecast10);
    renderUV(forecast10);
    updateFavButton();

    // Init/update radar
    if(!radarMap){
      // Delay radar init for smooth loading
      setTimeout(()=>{
        initRadar();
      }, 500);
    } else {
      radarMap.setView([currentCity.lat, currentCity.lon], 7);
    }

    hideLoading();
  } catch(e) {
    console.error('Load error:', e);
    hideLoading();
    showError('Fehler beim Laden der Wetterdaten. Bitte erneut versuchen.');
  }
}

// ─── Geolocation ───────────────────────────────────────────
function tryGeolocation(){
  if(!navigator.geolocation) { loadAllData(); return; }
  navigator.geolocation.getCurrentPosition(
    async pos => {
      const lat = pos.coords.latitude;
      const lon = pos.coords.longitude;
      // Reverse geocode for city name
      try {
        const data = await fetchJSON(
          `https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lon}&format=json&accept-language=de`
        );
        const name = data.address?.city || data.address?.town || data.address?.village || data.address?.municipality || 'Mein Standort';
        currentCity = { name, lat, lon };
        Store.set('lastCity', currentCity);
      } catch(e) {
        currentCity = { name:'Mein Standort', lat, lon };
      }
      loadAllData();
    },
    () => {
      // Geolocation denied, use stored city
      loadAllData();
    },
    { timeout: 5000, maximumAge: 300000 }
  );
}

// ─── Resize Handler ────────────────────────────────────────
let resizeTimeout;
window.addEventListener('resize', () => {
  clearTimeout(resizeTimeout);
  resizeTimeout = setTimeout(() => {
    // Re-render chart on resize
    const forecast = Store.get('lastForecast');
    if(radarMap) radarMap.invalidateSize();
  }, 200);
});

// ─── Init ──────────────────────────────────────────────────
tryGeolocation();

})();
</script>
